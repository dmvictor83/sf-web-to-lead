<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us</title>

  <script>
    var SF_ENDPOINT =
      'https://orgfarm-6c5e2e6da2-dev-ed.develop.my.salesforce-sites.com' +
      '/PaymentPortal/services/apexrest/w2l/';
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      background: #fff;
      border-radius: 0.75rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 600px;
      overflow: hidden;
    }

    .form-header {
      background: linear-gradient(135deg, #16325c 0%, #1c4c8a 100%);
      padding: 2rem 2rem 1.5rem;
      color: #fff;
    }
    .form-header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.25rem; }
    .form-header p  { font-size: 0.875rem; opacity: 0.85; }

    .form-body { padding: 2rem; }

    .row   { display: flex; gap: 1rem; }
    .field { margin-bottom: 1.25rem; flex: 1; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #3e3e3c;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    label .req { color: #c23934; margin-left: 2px; }

    input[type=text], input[type=email], input[type=tel], input[type=url] {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid #d8d8d8;
      border-radius: 0.375rem;
      font-size: 0.95rem;
      color: #1a1a1a;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fff;
    }
    input:focus {
      outline: none;
      border-color: #0070d2;
      box-shadow: 0 0 0 3px rgba(0,112,210,0.15);
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #706e6b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 1.5rem 0 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #f0f0f0;
    }

    .captcha-wrap { margin-bottom: 1.5rem; }

    .btn-submit {
      width: 100%;
      padding: 0.75rem;
      background: #0070d2;
      color: #fff;
      border: none;
      border-radius: 0.375rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.02em;
    }
    .btn-submit:hover:not(:disabled) { background: #005fb2; }
    .btn-submit:disabled { background: #c9c7c5; cursor: not-allowed; }

    .error-banner {
      background: #fef1f1;
      border: 1px solid #f4b8b5;
      border-radius: 0.375rem;
      padding: 0.75rem 1rem;
      color: #c23934;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .screen {
      text-align: center;
      padding: 3rem 2rem;
      display: none;
    }
    .screen-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 2rem;
    }
    .success-icon { background: #e3f5ec; }
    .limit-icon   { background: #fef1f1; }
    .screen h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .screen p  { color: #706e6b; font-size: 0.95rem; }
    .success-screen h2 { color: #04844b; }
    .limit-screen   h2 { color: #c23934; }

    @media (max-width: 480px) {
      .row { flex-direction: column; gap: 0; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="form-header">
    <h1>Get in Touch</h1>
    <p>Fill out the form below and our team will reach out shortly.</p>
  </div>

  <!-- Success screen -->
  <div class="screen success-screen" id="successScreen">
    <div class="screen-icon success-icon">✓</div>
    <h2>Thank you!</h2>
    <p>We received your information and will be in touch soon.</p>
  </div>

  <!-- Rate limit screen -->
  <div class="screen limit-screen" id="limitScreen">
    <div class="screen-icon limit-icon">⚠</div>
    <h2>Form Temporarily Unavailable</h2>
    <p>We have reached our monthly submission limit.<br>
       Please try again next month or reach out to us directly.</p>
  </div>

  <!-- Form -->
  <div class="form-body" id="formBody">

    <div class="error-banner" id="errorBanner"></div>

    <form id="leadForm" novalidate>

      <!-- Contact info -->
      <div class="row">
        <div class="field">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" autocomplete="given-name" placeholder="Jane"/>
        </div>
        <div class="field">
          <label for="lastName">Last Name <span class="req">*</span></label>
          <input type="text" id="lastName" required autocomplete="family-name" placeholder="Smith"/>
        </div>
      </div>

      <div class="field">
        <label for="company">Company <span class="req">*</span></label>
        <input type="text" id="company" required autocomplete="organization" placeholder="ACME Corp"/>
      </div>

      <div class="row">
        <div class="field">
          <label for="email">Email <span class="req">*</span></label>
          <input type="email" id="email" required autocomplete="email" placeholder="jane@acme.com"/>
        </div>
        <div class="field">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" autocomplete="tel" placeholder="+1 555 000 0000"/>
        </div>
      </div>

      <div class="field">
        <label for="website">Website</label>
        <input type="url" id="website" autocomplete="url" placeholder="https://acme.com"/>
      </div>

      <!-- Address -->
      <div class="section-label">Address</div>

      <div class="field">
        <label for="street">Street</label>
        <input type="text" id="street" autocomplete="street-address" placeholder="123 Main St"/>
      </div>

      <div class="row">
        <div class="field">
          <label for="city">City</label>
          <input type="text" id="city" autocomplete="address-level2" placeholder="Austin"/>
        </div>
        <div class="field">
          <label for="state">State / Province</label>
          <input type="text" id="state" autocomplete="address-level1" placeholder="TX"/>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="postalCode">ZIP / Postal Code</label>
          <input type="text" id="postalCode" autocomplete="postal-code" placeholder="78701"/>
        </div>
        <div class="field">
          <label for="country">Country</label>
          <input type="text" id="country" autocomplete="country-name" placeholder="US"/>
        </div>
      </div>

      <!-- reCAPTCHA v2 -->
      <div class="captcha-wrap">
        <div class="g-recaptcha"
             data-sitekey="6Lcva14tAAAAAN1XuRMNFBDpuNm1ky_MBIJ-6MJl"></div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Submit</button>

    </form>
  </div>
</div>

<!-- reCAPTCHA only — no Google Maps needed -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>
(function() {
  var form          = document.getElementById('leadForm');
  var submitBtn     = document.getElementById('submitBtn');
  var errorBanner   = document.getElementById('errorBanner');
  var formBody      = document.getElementById('formBody');
  var successScreen = document.getElementById('successScreen');
  var limitScreen   = document.getElementById('limitScreen');

  function showError(msg) {
    errorBanner.textContent   = msg;
    errorBanner.style.display = 'block';
    window.scrollTo(0, 0);
  }
  function hideError() { errorBanner.style.display = 'none'; }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    hideError();

    var captchaToken = typeof grecaptcha !== 'undefined'
      ? grecaptcha.getResponse() : '';
    if (!captchaToken) {
      showError('Please complete the reCAPTCHA checkbox.');
      return;
    }

    submitBtn.disabled    = true;
    submitBtn.textContent = 'Submitting…';

    var payload = {
      firstName:    document.getElementById('firstName').value.trim(),
      lastName:     document.getElementById('lastName').value.trim(),
      company:      document.getElementById('company').value.trim(),
      email:        document.getElementById('email').value.trim(),
      phone:        document.getElementById('phone').value.trim(),
      website:      document.getElementById('website').value.trim(),
      street:       document.getElementById('street').value.trim(),
      city:         document.getElementById('city').value.trim(),
      state:        document.getElementById('state').value.trim(),
      postalCode:   document.getElementById('postalCode').value.trim(),
      country:      document.getElementById('country').value.trim(),
      captchaToken: captchaToken
    };

    fetch(SF_ENDPOINT, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    })
    .then(function(res) {
      return res.json().then(function(data) {
        return { status: res.status, data: data };
      });
    })
    .then(function(r) {
      if (r.status === 429) {
        formBody.style.display        = 'none';
        limitScreen.style.display     = 'block';
        return;
      }
      if (r.data.success) {
        formBody.style.display        = 'none';
        successScreen.style.display   = 'block';
      } else {
        showError(r.data.message || 'Something went wrong. Please try again.');
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Submit';
        if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
      }
    })
    .catch(function() {
      showError('Network error. Please check your connection and try again.');
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Submit';
      if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
    });
  });
})();
</script>

</body>
</html>
