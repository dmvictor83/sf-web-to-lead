<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FC Barcelona — Contact Us</title>

  <script>
    var SF_ENDPOINT =
      'https://orgfarm-6c5e2e6da2-dev-ed.develop.my.salesforce-sites.com' +
      '/PaymentPortal/services/apexrest/w2l/';
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    /* ── Barcelona palette ───────────────────────────────────────────────── */
    :root {
      --barca-blue:   #004D98;
      --barca-red:    #A50044;
      --barca-gold:   #EDBB00;
      --barca-dark:   #01264C;
      --barca-stripe: #003070;
      --white:        #FFFFFF;
      --off-white:    #F5F5F7;
      --text-dark:    #1a1a2e;
      --text-mid:     #555;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--barca-dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      /* subtle diagonal stripe pattern */
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 18px,
        rgba(255,255,255,0.02) 18px,
        rgba(255,255,255,0.02) 36px
      );
    }

    .container {
      width: 100%;
      max-width: 620px;
      border-radius: 1rem;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(237,187,0,0.2);
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .form-header {
      position: relative;
      overflow: hidden;
      padding: 0;
    }

    /* Vertical stripes: blue | red | gold | red | blue */
    .stripes {
      display: flex;
      height: 8px;
    }
    .stripes span { flex: 1; }
    .stripes span:nth-child(1) { background: var(--barca-blue); flex: 3; }
    .stripes span:nth-child(2) { background: var(--barca-red);  flex: 3; }
    .stripes span:nth-child(3) { background: var(--barca-gold); flex: 1; }
    .stripes span:nth-child(4) { background: var(--barca-red);  flex: 3; }
    .stripes span:nth-child(5) { background: var(--barca-blue); flex: 3; }

    .header-body {
      background: linear-gradient(160deg, var(--barca-blue) 0%, var(--barca-dark) 60%, var(--barca-red) 160%);
      padding: 2rem 2rem 2.25rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    /* Crest — built from CSS */
    .crest {
      flex-shrink: 0;
      width: 64px;
      height: 74px;
      position: relative;
    }
    .crest-shield {
      width: 64px;
      height: 74px;
      position: relative;
      background: var(--white);
      clip-path: polygon(0% 0%, 100% 0%, 100% 65%, 50% 100%, 0% 65%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }
    .crest-tl { background: var(--barca-red); }
    .crest-tr { background: var(--barca-blue); }
    .crest-bl { background: var(--barca-blue); }
    .crest-br { background: var(--barca-red); }
    .crest-cross {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .crest-cross::before {
      content: '';
      position: absolute;
      width: 60%;
      height: 18%;
      background: rgba(255,255,255,0.85);
    }
    .crest-cross::after {
      content: '';
      position: absolute;
      width: 18%;
      height: 55%;
      background: rgba(255,255,255,0.85);
    }
    .crest-gold-band {
      position: absolute;
      bottom: 26px;
      left: 0; right: 0;
      height: 9px;
      background: var(--barca-gold);
    }

    .header-text h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.75rem;
      font-weight: 900;
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.1;
    }
    .header-text h1 span { color: var(--barca-gold); }
    .header-text p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
      margin-top: 0.3rem;
      font-style: italic;
    }

    /* ── Form body ───────────────────────────────────────────────────────── */
    .form-body {
      background: var(--white);
      padding: 2rem;
    }

    .error-banner {
      background: #fff0f3;
      border: 1.5px solid var(--barca-red);
      border-radius: 0.375rem;
      padding: 0.75rem 1rem;
      color: var(--barca-red);
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
      font-weight: 500;
    }

    .section-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--barca-blue);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 1.5rem 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 2px;
      background: linear-gradient(90deg, var(--barca-blue), var(--barca-gold), transparent);
      border-radius: 1px;
    }

    .row   { display: flex; gap: 1rem; }
    .field { margin-bottom: 1.25rem; flex: 1; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-mid);
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    label .req { color: var(--barca-red); margin-left: 2px; }

    input[type=text], input[type=email], input[type=tel], input[type=url] {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid #d8d8d8;
      border-radius: 0.375rem;
      font-size: 0.95rem;
      font-family: 'Barlow', sans-serif;
      color: var(--text-dark);
      transition: border-color 0.15s, box-shadow 0.15s;
      background: var(--off-white);
    }
    input:focus {
      outline: none;
      border-color: var(--barca-blue);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(0,77,152,0.12);
    }

    .captcha-wrap { margin: 1.5rem 0; }

    .btn-submit {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, var(--barca-red) 0%, #8B0039 100%);
      color: var(--white);
      border: none;
      border-radius: 0.375rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn-submit::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(237,187,0,0.25), transparent);
      transition: left 0.4s;
    }
    .btn-submit:hover:not(:disabled)::before { left: 150%; }
    .btn-submit:hover:not(:disabled) {
      background: linear-gradient(135deg, #c00050 0%, var(--barca-red) 100%);
      box-shadow: 0 4px 16px rgba(165,0,68,0.4);
    }
    .btn-submit:disabled {
      background: #c9c7c5;
      cursor: not-allowed;
    }

    /* ── Result screens ──────────────────────────────────────────────────── */
    .screen {
      background: var(--white);
      text-align: center;
      padding: 3.5rem 2rem;
      display: none;
    }

    .screen-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 2.2rem;
    }
    .success-icon { background: linear-gradient(135deg, var(--barca-blue), var(--barca-dark)); color: var(--barca-gold); }
    .limit-icon   { background: #fef1f1; }

    .screen h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .success-screen h2 { color: var(--barca-blue); }
    .limit-screen   h2 { color: var(--barca-red); }
    .screen p { color: var(--text-mid); font-size: 0.95rem; }
    .screen .tagline {
      margin-top: 1rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--barca-gold);
    }

    /* Bottom gold bar */
    .gold-bar {
      height: 5px;
      background: linear-gradient(90deg, var(--barca-blue), var(--barca-gold), var(--barca-red));
    }

    @media (max-width: 480px) {
      .row { flex-direction: column; gap: 0; }
      .header-body { gap: 0.85rem; }
      .crest { width: 48px; height: 56px; }
      .crest-shield { width: 48px; height: 56px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <div class="form-header">
    <div class="stripes">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="header-body">
      <div class="crest" aria-hidden="true">
        <div class="crest-shield">
          <div class="crest-tl"></div>
          <div class="crest-tr"></div>
          <div class="crest-bl"></div>
          <div class="crest-br"></div>
          <div class="crest-cross"></div>
        </div>
        <div class="crest-gold-band"></div>
      </div>
      <div class="header-text">
        <h1>Get in <span>Touch</span></h1>
        <p>Més que un club — More than a club</p>
      </div>
    </div>
  </div>

  <!-- ── Success screen ──────────────────────────────────────────────── -->
  <div class="screen success-screen" id="successScreen">
    <div class="screen-icon success-icon">⚽</div>
    <h2>Gol!</h2>
    <p>We received your information and will be in touch soon.</p>
    <p class="tagline">Visca el Barça!</p>
  </div>

  <!-- ── Rate limit screen ───────────────────────────────────────────── -->
  <div class="screen limit-screen" id="limitScreen">
    <div class="screen-icon limit-icon">⚠</div>
    <h2>Form Unavailable</h2>
    <p>Monthly submission limit reached.<br>Please try again next month.</p>
  </div>

  <!-- ── Form ────────────────────────────────────────────────────────── -->
  <div class="form-body" id="formBody">

    <div class="error-banner" id="errorBanner"></div>

    <form id="leadForm" novalidate>

      <div class="row">
        <div class="field">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" autocomplete="given-name" placeholder="Jane"/>
        </div>
        <div class="field">
          <label for="lastName">Last Name <span class="req">*</span></label>
          <input type="text" id="lastName" required autocomplete="family-name" placeholder="Smith"/>
        </div>
      </div>

      <div class="field">
        <label for="company">Company <span class="req">*</span></label>
        <input type="text" id="company" required autocomplete="organization" placeholder="ACME Corp"/>
      </div>

      <div class="row">
        <div class="field">
          <label for="email">Email <span class="req">*</span></label>
          <input type="email" id="email" required autocomplete="email" placeholder="jane@acme.com"/>
        </div>
        <div class="field">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" autocomplete="tel" placeholder="+1 555 000 0000"/>
        </div>
      </div>

      <div class="field">
        <label for="website">Website</label>
        <input type="url" id="website" autocomplete="url" placeholder="https://acme.com"/>
      </div>

      <div class="section-label">Address</div>

      <div class="field">
        <label for="street">Street</label>
        <input type="text" id="street" autocomplete="street-address" placeholder="123 Main St"/>
      </div>

      <div class="row">
        <div class="field">
          <label for="city">City</label>
          <input type="text" id="city" autocomplete="address-level2" placeholder="Austin"/>
        </div>
        <div class="field">
          <label for="state">State / Province</label>
          <input type="text" id="state" autocomplete="address-level1" placeholder="TX"/>
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="postalCode">ZIP / Postal Code</label>
          <input type="text" id="postalCode" autocomplete="postal-code" placeholder="78701"/>
        </div>
        <div class="field">
          <label for="country">Country</label>
          <input type="text" id="country" autocomplete="country-name" placeholder="US"/>
        </div>
      </div>

      <div class="captcha-wrap">
        <div class="g-recaptcha"
             data-sitekey="6Lcva14tAAAAAN1XuRMNFBDpuNm1ky_MBIJ-6MJl"></div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Send Message</button>

    </form>
  </div>

  <div class="gold-bar"></div>
</div>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<script>
(function() {
  var form          = document.getElementById('leadForm');
  var submitBtn     = document.getElementById('submitBtn');
  var errorBanner   = document.getElementById('errorBanner');
  var formBody      = document.getElementById('formBody');
  var successScreen = document.getElementById('successScreen');
  var limitScreen   = document.getElementById('limitScreen');

  function showError(msg) {
    errorBanner.textContent   = msg;
    errorBanner.style.display = 'block';
    window.scrollTo(0, 0);
  }
  function hideError() { errorBanner.style.display = 'none'; }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    hideError();

    var captchaToken = typeof grecaptcha !== 'undefined'
      ? grecaptcha.getResponse() : '';
    if (!captchaToken) {
      showError('Please complete the reCAPTCHA checkbox.');
      return;
    }

    submitBtn.disabled    = true;
    submitBtn.textContent = 'Sending…';

    var payload = {
      firstName:    document.getElementById('firstName').value.trim(),
      lastName:     document.getElementById('lastName').value.trim(),
      company:      document.getElementById('company').value.trim(),
      email:        document.getElementById('email').value.trim(),
      phone:        document.getElementById('phone').value.trim(),
      website:      document.getElementById('website').value.trim(),
      street:       document.getElementById('street').value.trim(),
      city:         document.getElementById('city').value.trim(),
      state:        document.getElementById('state').value.trim(),
      postalCode:   document.getElementById('postalCode').value.trim(),
      country:      document.getElementById('country').value.trim(),
      captchaToken: captchaToken
    };

    fetch(SF_ENDPOINT, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    })
    .then(function(res) {
      return res.json().then(function(data) { return { status: res.status, data: data }; });
    })
    .then(function(r) {
      if (r.status === 429) {
        formBody.style.display    = 'none';
        limitScreen.style.display = 'block';
        return;
      }
      if (r.data.success) {
        formBody.style.display      = 'none';
        successScreen.style.display = 'block';
      } else {
        showError(r.data.message || 'Something went wrong. Please try again.');
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Send Message';
        if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
      }
    })
    .catch(function() {
      showError('Network error. Please check your connection and try again.');
      submitBtn.disabled    = false;
      submitBtn.textContent = 'Send Message';
      if (typeof grecaptcha !== 'undefined') grecaptcha.reset();
    });
  });
})();
</script>

</body>
</html>
