<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" style="background:#fff">
  <title>W2L In-Site Page Sequence Diagram</title>
  <desc>UML sequence diagram showing the Experience Cloud LWC calling Apex directly via AuraEnabled, with reCAPTCHA sandboxed in an iframe to work around Lightning Web Security, then inserting a Lead.</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arr-ret" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#aaa"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="#fff"/>

  <!-- ── ACTOR COLUMNS ── -->
  <rect x="20" y="16" width="80" height="48" rx="6" fill="#f4f4f5"/>
  <text x="60" y="36" text-anchor="middle" fill="#111" font-weight="600" font-size="11">User /</text>
  <text x="60" y="50" text-anchor="middle" fill="#111" font-weight="600" font-size="11">Browser</text>

  <rect x="140" y="16" width="100" height="48" rx="6" fill="#dbeafe"/>
  <text x="190" y="36" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="11">w2lLeadForm</text>
  <text x="190" y="50" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="11">LWC</text>

  <rect x="280" y="16" width="110" height="48" rx="6" fill="#fef3c7"/>
  <text x="335" y="36" text-anchor="middle" fill="#92400e" font-weight="600" font-size="11">Guest User</text>
  <text x="335" y="50" text-anchor="middle" fill="#92400e" font-weight="600" font-size="11">(W2L Profile)</text>

  <rect x="430" y="16" width="90" height="48" rx="6" fill="#dbeafe"/>
  <text x="475" y="36" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="11">Apex</text>
  <text x="475" y="50" text-anchor="middle" fill="#1e40af" font-weight="600" font-size="11">@AuraEnabled</text>

  <rect x="560" y="16" width="100" height="48" rx="6" fill="#fee2e2"/>
  <text x="610" y="36" text-anchor="middle" fill="#991b1b" font-weight="600" font-size="11">Google</text>
  <text x="610" y="50" text-anchor="middle" fill="#991b1b" font-weight="600" font-size="11">reCAPTCHA</text>

  <rect x="700" y="16" width="120" height="48" rx="6" fill="#dcfce7"/>
  <text x="760" y="36" text-anchor="middle" fill="#166534" font-weight="600" font-size="11">Salesforce</text>
  <text x="760" y="50" text-anchor="middle" fill="#166534" font-weight="600" font-size="11">Lead / Submission</text>

  <!-- lifelines -->
  <line x1="60"  y1="64" x2="60"  y2="460" stroke="#e4e4e7" stroke-dasharray="4,4"/>
  <line x1="190" y1="64" x2="190" y2="460" stroke="#93c5fd" stroke-dasharray="4,4"/>
  <line x1="335" y1="64" x2="335" y2="460" stroke="#fcd34d" stroke-dasharray="4,4"/>
  <line x1="475" y1="64" x2="475" y2="460" stroke="#93c5fd" stroke-dasharray="4,4"/>
  <line x1="610" y1="64" x2="610" y2="460" stroke="#fca5a5" stroke-dasharray="4,4"/>
  <line x1="760" y1="64" x2="760" y2="460" stroke="#86efac" stroke-dasharray="4,4"/>

  <rect x="20" y="80" width="860" height="18" rx="3" fill="#f4f4f5"/>
  <text x="450" y="93" text-anchor="middle" fill="#555" font-weight="700" font-size="11" letter-spacing="0.5">IN-SITE PAGE — Experience Cloud LWC (same-origin, no CORS)</text>

  <line x1="60" y1="122" x2="177" y2="122" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="118" y="118" text-anchor="middle" fill="#111" font-size="10">fill form + solve reCAPTCHA checkbox</text>

  <rect x="142" y="132" width="290" height="26" rx="3" fill="#fef9c3" stroke="#fcd34d"/>
  <text x="287" y="142" text-anchor="middle" fill="#78350f" font-size="9">reCAPTCHA renders in a sandboxed &lt;iframe&gt; (w2lCaptcha static resource) —</text>
  <text x="287" y="153" text-anchor="middle" fill="#78350f" font-size="9">Lightning Web Security blocks it running directly in an LWC; token returns via postMessage</text>

  <line x1="190" y1="182" x2="322" y2="182" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="256" y="178" text-anchor="middle" fill="#1e40af" font-size="10">@AuraEnabled submitLead(payloadJson)</text>

  <line x1="335" y1="210" x2="467" y2="210" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="401" y="206" text-anchor="middle" fill="#1e40af" font-size="10">invoke W2LController.submitLead as guest identity</text>

  <rect x="285" y="220" width="290" height="16" rx="3" fill="#fef9c3" stroke="#fcd34d"/>
  <text x="430" y="232" text-anchor="middle" fill="#78350f" font-size="9">guest can only create Lead + W2L_Submission__c — no read, no delete</text>

  <line x1="475" y1="260" x2="602" y2="260" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="538" y="256" text-anchor="middle" fill="#991b1b" font-size="10">verify captcha token (secret key, server-side)</text>

  <line x1="602" y1="288" x2="483" y2="288" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="538" y="284" text-anchor="middle" fill="#991b1b" font-size="10">success / fail</text>

  <rect x="20" y="310" width="36" height="16" fill="#eee" stroke="#999"/>
  <text x="38" y="322" text-anchor="middle" fill="#555" font-size="9" font-weight="700">alt</text>
  <text x="64" y="322" fill="#555" font-size="9" font-style="italic">[captcha ok AND under monthly limit]</text>
  <rect x="20" y="310" width="860" height="112" fill="none" stroke="#999" stroke-width="1"/>

  <line x1="475" y1="336" x2="752" y2="336" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="613" y="332" text-anchor="middle" fill="#166534" font-size="10">insert Lead + W2L_Submission__c</text>

  <line x1="475" y1="364" x2="198" y2="364" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="332" y="360" text-anchor="middle" fill="#555" font-size="10">{ success: true }</text>

  <line x1="20" y1="382" x2="880" y2="382" stroke="#999" stroke-dasharray="4,3"/>
  <text x="26" y="378" fill="#555" font-size="9" font-style="italic">[rejected]</text>

  <line x1="475" y1="406" x2="198" y2="406" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="332" y="402" text-anchor="middle" fill="#555" font-size="10">{ statusCode: 403 / 429 / 400 }</text>

  <line x1="190" y1="440" x2="68" y2="440" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="129" y="436" text-anchor="middle" fill="#555" font-size="10">success screen / error message</text>

  <!-- LEGEND -->
  <rect x="20" y="480" width="860" height="76" rx="4" fill="#f4f4f5"/>
  <text x="36" y="497" fill="#555" font-weight="700" font-size="10">Legend</text>

  <line x1="36" y1="512" x2="76" y2="512" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="82" y="516" fill="#111" font-size="10">Salesforce / Apex call</text>

  <line x1="36" y1="530" x2="76" y2="530" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arr-red)"/>
  <text x="82" y="534" fill="#111" font-size="10">reCAPTCHA API callout</text>

  <line x1="220" y1="512" x2="260" y2="512" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="266" y="516" fill="#111" font-size="10">Salesforce DB write</text>

  <line x1="220" y1="530" x2="260" y2="530" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-ret)"/>
  <text x="266" y="534" fill="#111" font-size="10">Return / response</text>

  <rect x="420" y="504" width="40" height="14" rx="2" fill="#fef9c3" stroke="#fcd34d"/>
  <text x="440" y="514" text-anchor="middle" fill="#78350f" font-size="9">note</text>
  <text x="466" y="516" fill="#111" font-size="10">Security / scope annotation</text>

  <text x="36" y="547" fill="#555" font-size="9" font-style="italic">No login, no token, no API key at any step — the guest identity is the only "authentication" here.</text>
</svg>
